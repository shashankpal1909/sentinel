name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: Verify Formatting
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Code is not formatted. Run go fmt ./..."
            exit 1
          fi

      - name: Run Vet
        run: go vet ./...

      - name: Run Tests
        run: go test ./...

      - name: Run Race Detector
        run: go test -race ./...

      - name: Check Test Coverage
        run: go test -cover ./...
