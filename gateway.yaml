server:
  port: 8080

services:
  auth-service:
    strategy: round-robin
    backends:
      - http://localhost:8001
      - http://localhost:8002

  user-service:
    strategy: round-robin
    backends:
      - http://localhost:8011
      - http://localhost:8012
      - http://localhost:8013

  billing-service:
    strategy: random
    backends:
      - http://localhost:8021
      - http://localhost:8022

  notification-service:
    strategy: random
    backends:
      - http://localhost:8031

routes:
  # Auth endpoints sharing auth-service
  - path: /login
    service: auth-service
  - path: /logout
    service: auth-service
  - path: /oauth/token
    service: auth-service

  # User management endpoints sharing user-service
  - path: /users
    service: user-service
  - path: /profile
    service: user-service
  - path: /settings
    service: user-service

  # Billing endpoints
  - path: /invoices
    service: billing-service
  - path: /checkout
    service: billing-service

  # Notifications
  - path: /notifications
    service: notification-service