<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Sentinel Admin Dashboard</title>

    <script>
      (function () {
        try {
          var theme = localStorage.getItem('sentinel-theme') || 'dark';
          var resolved = theme;
          if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(resolved);
          document.documentElement.style.setProperty('color-scheme', resolved);
        } catch (e) {}
      })();
    </script>
  </head>
  <body
    class="bg-background text-foreground selection:bg-primary selection:text-primary-foreground"
  >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
